<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCM AI System - Project Diagrams</title>
    <style>
        :root {
            --primary-green: #5a8f7b;
            --light-green: #e8f5e9;
            --text-dark: #2c3e50;
            --bg-color: #f4f6f8;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .slide-container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .slide {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            overflow: hidden;
            page-break-inside: avoid; /* For printing */
        }

        .slide-header {
            background-color: var(--primary-green);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .slide-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0;
        }

        .slide-number {
            font-size: 1rem;
            opacity: 0.8;
            font-weight: 500;
        }

        .slide-content {
            padding: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 400px;
        }

        .slide-content img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            object-fit: contain;
        }

        .footer-note {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 0.9rem;
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }
            .slide {
                box-shadow: none;
                border: 1px solid #eee;
                margin-bottom: 20px;
                break-after: page;
            }
            .slide-header {
                background-color: var(--primary-green) !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }
    </style>
</head>
<body>

    <div class="slide-container">
        
        <!-- Slide 1: User Login -->
        <div class="slide">
            <div class="slide-header">
                <h2 class="slide-title">User Login Validation Flow</h2>
                <span class="slide-number">01 / 05</span>
            </div>
            <div class="slide-content">
                <img src="https://image.qwenlm.ai/public_source/23f3c71a-a868-4942-bdd0-79fa7fc38b35/18163d5ed-e6bd-4dae-8ee5-f70d73c01089.png" alt="User Login Flowchart">
            </div>
        </div>

        <!-- Slide 2: Wellness System -->
        <div class="slide">
            <div class="slide-header">
                <h2 class="slide-title">TCM Wellness & Recipe Logic</h2>
                <span class="slide-number">02 / 05</span>
            </div>
            <div class="slide-content">
                <img src="https://image.qwenlm.ai/public_source/23f3c71a-a868-4942-bdd0-79fa7fc38b35/15bee5a4e-b246-4e52-a106-54a3d550f7a0.png" alt="Wellness System Flowchart">
            </div>
        </div>

        <!-- Slide 3: Secure Logout -->
        <div class="slide">
            <div class="slide-header">
                <h2 class="slide-title">Secure Logout Process</h2>
                <span class="slide-number">03 / 05</span>
            </div>
            <div class="slide-content">
                <img src="https://image.qwenlm.ai/public_source/23f3c71a-a868-4942-bdd0-79fa7fc38b35/122acb5fe-174c-4f6d-b068-9a14a6c452e7.png" alt="Logout Flowchart">
            </div>
        </div>

        <!-- Slide 4: Welcome Page -->
        <div class="slide">
            <div class="slide-header">
                <h2 class="slide-title">Welcome Page & Access Control</h2>
                <span class="slide-number">04 / 05</span>
            </div>
            <div class="slide-content">
                <img src="https://image.qwenlm.ai/public_source/23f3c71a-a868-4942-bdd0-79fa7fc38b35/1d82e0664-f02d-4c7d-a68e-d7e418d943a6.png" alt="Welcome Page Flowchart">
            </div>
        </div>

        <!-- Slide 5: AI Doctor -->
        <div class="slide">
            <div class="slide-header">
                <h2 class="slide-title">AI Doctor Consultation Workflow</h2>
                <span class="slide-number">05 / 05</span>
            </div>
            <div class="slide-content">
                <img src="https://image.qwenlm.ai/public_source/23f3c71a-a868-4942-bdd0-79fa7fc38b35/1b8ad99aa-8064-4522-b3ec-80e08a22a56d.png" alt="AI Doctor Flowchart">
            </div>
        </div>

    </div>

    <div class="footer-note">
        <p>Generated for TCM AI Final Project Documentation • Use Ctrl+P to save as PDF</p>
    </div>

</body>
</html>
