<!DOCTYPE html>
<html lang="zh-HK">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歷史看診紀錄 - 杏林院</title>

    <!-- 外部樣式表精確連結 -->
    <link rel="stylesheet" href="final_project_css/history.css">

    <!-- 門禁安全守衛：未叩門或重新打開網頁，無條件強制彈回大門迎賓頁 當所有網頁整好後 開啟這個-->


    <!-- <script>
        if (!sessionStorage.getItem('hasWelcomed')) {
            window.location.replace('welcome_page.html'); // 💡 使用 replace 可以鎖死歷史紀錄，防止按上一頁穿幫
        }
    </script> -->

</head>

<body>

    <!-- 統一風格的草本綠 Header 橫條 -->
    <div class="header">
        <img class="logo-img" src="erb_finalproject_photo/logo.png" alt="◆ 杏林院 ◆"
            onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
        <h1 style="display:none;">◆ 杏林院 ◆</h1>

            <!-- 這顆漢堡包按鈕本體！ -->
        <button class="hamburger-toggle" id="hamburgerMenuBtn">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </button>

        <!-- 帶有 漢堡包 id 的完全體 -->
        <div class="nav-links" id="navLinksContainer">

            <a href="main_menu.html" class="nav-btn" id="navHome">首頁</a>
            <a href="history.html" class="nav-btn active" id="navHistory">歷史看診紀錄</a>
            <a href="#" class="nav-btn logout" id="navLogout">發出</a>
        </div>
    </div>

    <div class="main-content">
        <div class="history-card">
            <div class="history-title">📜 杏林院 · 歷史看診日誌</div>

            <div class="history-list" id="historyListContainer">

                <!-- 模擬數據 1 連接DB後不會出現-->
                <div class="history-item">
                    <div class="history-date">📅 2026年06月27日 13:19</div>
                    <div class="history-meta">
                        <div class="meta-symptoms"><strong>自述病徵：</strong>咳、喉嚨痛、有黃痰、舌苔發黃</div>
                        <div class="meta-disease"><strong>AI 辨證結果：</strong>風熱犯肺證</div>
                    </div>
                    <div class="history-recipe-preview">🍲 建議食療：冰糖燉雪梨</div>
                    <!-- 💡 雙按鈕齊就位 -->
                    <button class="btn-view-detail"
                        onclick="reviewOldData('風熱犯肺證', '冰糖燉雪梨', '雪梨 1 個、冰糖 15-20 克、水 適量。', '1. 將雪梨洗淨，橫切開頂部做蓋...\n2. 在梨心空處放入冰糖...', '金銀花 (10g)', '連翹 (15g)', '請注意防風保暖，多喝溫開水。')">查看詳情</button>
                    <button class="btn-delete-record" onclick="mockDelete(this)">🗑️ 刪除紀錄</button>
                </div>

                <!-- 模擬數據 2 連接DB後不會出現 -->
                <div class="history-item">
                    <div class="history-date">📅 2026年06月20日 10:45</div>
                    <div class="history-meta">
                        <div class="meta-symptoms"><strong>自述病徵：</strong>生冷食物後胃痛、怕冷、流清鼻水</div>
                        <div class="meta-disease"><strong>AI 辨證結果：</strong>風寒束表證</div>
                    </div>
                    <div class="history-recipe-preview">🍲 建議食療：生薑紅糖茶</div>
                    <!-- 💡 雙按鈕齊就位 -->
                    <button class="btn-view-detail"
                        onclick="reviewOldData('風寒束表證', '生薑紅糖茶', '生薑 3 片、紅糖 10 克、水 300 毫升。', '1. 生薑洗淨切片。\n2. 鍋中加入水與薑片，大火煮沸後轉小火煮10分鐘。\n3. 加入紅糖攪拌至融化即可趁熱飲用。', '防風 (10g)', '荊芥 (10g)', '日常注意防寒保暖，忌食生冷、油膩及寒涼食物。')">查看詳情</button>
                    <button class="btn-delete-record" onclick="mockDelete(this)">🗑️ 刪除紀錄</button>
                </div>

            </div>
        </div>
    </div>

    <!-- 歷史紀錄頁專屬控制核心 -->
    <script>
        const useRealBackend = false; // 💡 日後串接 Express+MongoDB 時改為 true
        const backendBaseUrl = 'http://localhost:3000';

        // 🟢 1. 跨網頁聯動核心：點擊「查看詳情」時將快取帶回首頁
        function reviewOldData(disease, recName, recIng, recMeth, h1, h2, prec, visitDate) {
            const oldData = {
                disease: disease,
                recipeName: recName,
                recipeIngredients: recIng,
                recipeMethod: recMeth,
                herbName1: h1,
                herbName2: h2,
                precautions: prec,
                visitDate: visitDate || "2026年06月27日 13:19"
            };
            sessionStorage.setItem('reviewData', JSON.stringify(oldData));
            window.location.href = 'doctor_option.html';
        }
        // 開通DB JS Express Gemini 後 並把最底部的貼上在虛線範圍內 使系統懂得取 寫        
        //-----------------------------------------------------------------------------------------//
        // 🟢 2. 現在（純前端模擬）：點擊刪除按鈕，立刻彈出視窗並在畫面上把該條卡片隱藏
        function mockDelete(btnElement) {
            if (confirm('您確定要永久刪除這筆看診日誌嗎？此操作無法復原。')) {
                // 找出按鈕所屬的那一條 history-item 容器並將其移除
                const historyItem = btnElement.closest('.history-item');
                if (historyItem) {
                    historyItem.style.transition = 'all 0.4s ease';
                    historyItem.style.opacity = '0';
                    historyItem.style.transform = 'translateY(-10px)';
                    setTimeout(() => {
                        historyItem.remove();
                        alert('該看診紀錄已安全移除！');
                    }, 400);
                }
            }
        }
        //--------------------------------------------------------------------------------------------//

        // 3. 讀取遠端 DB 機制 (日後連接 MongoDB Atlas 時全自動運行)
        window.addEventListener('DOMContentLoaded', async () => {
            if (useRealBackend) {
                try {
                    const response = await fetch(`${backendBaseUrl}/api/history`);
                    const result = await response.json();
                    if (result.success) {
                        const container = document.getElementById('historyListContainer');
                        container.innerHTML = '';
                        result.data.forEach(item => {
                            const dateStr = new Date(item.date).toLocaleString('zh-HK');
                            const itemHtml = `
                                <div class="history-item">
                                    <div class="history-date">📅 ${dateStr}</div>
                                    <div class="history-meta">
                                        <div class="meta-symptoms"><strong>自述病徵：</strong>${item.symptoms}</div>
                                        <div class="meta-disease"><strong>AI 辨證結果：</strong>${item.diagnosisResult.disease}</div>
                                    </div>
                                    <div class="history-recipe-preview">🍲 建議食療：${item.diagnosisResult.recipeName}</div>
                                    <button class="btn-view-detail" onclick="reviewOldData(
                                        '${item.diagnosisResult.disease}', '${item.diagnosisResult.recipeName}', 
                                        '${item.diagnosisResult.recipeIngredients}', '${item.diagnosisResult.recipeMethod}', 
                                        '${item.diagnosisResult.herbs[0].name}', '${item.diagnosisResult.herbs[1].name}', 
                                        '${item.diagnosisResult.precautions}', '${dateStr}'
                                    )">查看詳情</button>
                                    <!-- 💡 遠端渲染時，同步為刪除按鈕綁定真正的 MongoDB ID -->
                                    <button class="btn-delete-record" onclick="deleteRecord('${item._id}')">🗑️ 刪除紀錄</button>
                                </div>
                            `;
                            container.innerHTML += itemHtml;
                        });
                    }
                } catch (err) { console.error('無法連線至 MongoDB:', err); }
            }
        });

        // 🟢 4. 頂部導覽按鈕：點擊「首頁」
        document.getElementById('navHome').addEventListener('click', function (e) {
            e.preventDefault();
            window.location.href = 'main_menu.html';
        });

        // 🟢 5. 頂部導覽按鈕：點擊紅色「發出」
        document.getElementById('navLogout').addEventListener('click', function (e) {
            e.preventDefault();
            window.location.href = 'logout.html';
        });

        // 🟢 漢堡包動態彈出與變形控制
        const hamburgerBtn = document.getElementById('hamburgerMenuBtn');
        const navLinksContainer = document.getElementById('navLinksContainer');

        hamburgerBtn.addEventListener('click', function (e) {
            e.stopPropagation();
            this.classList.toggle('active');
            navLinksContainer.classList.toggle('open');
        });

        document.addEventListener('click', function () {
            hamburgerBtn.classList.remove('active');
            navLinksContainer.classList.remove('open');
        });


        /* =========================================================================
               歷史備忘錄：您提供之日後連接 EXPRESS + MONGODB ATLAS 的真實雲端刪除代碼
           ⚠️ 注意：以下代碼已被多行註解鎖定，僅供未來解鎖使用，目前不干擾網頁運行。
           =========================================================================
           async function deleteRecord(recordId) {
               if (!confirm('您確定要永久刪除這筆看診日誌嗎？此操作無法復原。')) return;
               try {
                   const response = await fetch(`${backendBaseUrl}/api/history/${recordId}`, {
                       method: 'DELETE'
                   });
                   const result = await response.json();
                   if (result.success) {
                       alert('該看診紀錄已安全從雲端資料庫中移除！');
                       window.location.reload();
                   }
               } catch (err) { console.error('資料庫刪除連線失敗:', err); }
           }
        */
    </script>

</body>

</html>
