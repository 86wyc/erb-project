<body>

    <!-- 完美保留原有風格的杏林院 Header 橫條 -->
    <div class="header">
        <img class="logo-img" src="erb_finalproject_photo/logo.png" alt="◆ 杏林院 ◆" 
             onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
        <h1 style="display:none;">◆ 杏林院 ◆</h1>
    </div>

    <!-- 古風大氣使用者登入卡片 -->
    <div class="login-card-box">
        <h2>使用者登入</h2>
        <p class="login-subtitle">歡迎步入杏林院，請登入以開啟 AI 智能辨證大腦。</p>

        <!-- 登入表單（預留給第二階段對接後端驗證，目前採取最流暢的即時模擬跳轉） -->
        <form id="loginForm" onsubmit="handleAuthLogin(event)">
            <div class="form-group">
                <label for="username">使用者帳號 (或電子郵件)：</label>
                <input type="text" id="username" class="form-control" placeholder="請輸入您的登入帳號..." required>
            </div>

            <div class="form-group">
                <label for="password">密碼：</label>
                <input type="password" id="password" class="form-control" placeholder="請輸入您的密碼..." required>
            </div>

            <button type="submit" class="btn-submit-login">安全登入</button>
        </form>

        <!-- 底部註冊導航連結 -->
        <div class="switch-route-link">
            還沒有杏林院帳號？<a href="user_register.html">立即註冊帳戶</a>
        </div>
    </div>



        <!-- 前端跳轉腳本控制中心（已為您完美埋入日後 MongoDB 雲端通電備忘錄） -->

            event.preventDefault(); // 阻止表單預設的頁面重整行為
            window.location.href = 'main_menu.html';
        }
